name: SecureFlow DevSecOps Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:

# -------------------------------
# 1. Secret Scan
# -------------------------------
  secret_scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run GitLeaks Secret Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# -------------------------------
# 2. Dependency Vulnerability Scan
# -------------------------------
  dependency_scan:
    needs: secret_scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run Dependency Scan
        run: |
          pip-audit -r requirements.txt

# -------------------------------
# 3. Static Code Security Scan
# -------------------------------
  static_security_scan:
    needs: dependency_scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Bandit
        run: pip install bandit

      - name: Run Static Security Scan
        run: |
          bandit -r .

# -------------------------------
# 4. Security Report Generation
# -------------------------------
  security_report:
    if: always()
    needs: [secret_scan, dependency_scan, static_security_scan]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate Security Dashboard
        run: |

          SECRET="${{ needs.secret_scan.result }}"
          DEP="${{ needs.dependency_scan.result }}"
          STATIC="${{ needs.static_security_scan.result }}"

          SCORE=0

          if [ "$SECRET" = "success" ]; then
            SCORE=$((SCORE+30))
          fi

          if [ "$DEP" = "success" ]; then
            SCORE=$((SCORE+40))
          fi

          if [ "$STATIC" = "success" ]; then
            SCORE=$((SCORE+30))
          fi

          if [ $SCORE -ge 80 ]; then
            STATUS="SECURE"
            COLOR="green"
          else
            STATUS="VULNERABLE"
            COLOR="red"
          fi

          echo "<html>" > security_report.html
          echo "<head><title>SecureFlow Security Dashboard</title></head>" >> security_report.html
          echo "<body style='font-family:Arial;background:#f5f5f5;padding:30px'>" >> security_report.html

          echo "<h1>🔐 SecureFlow DevSecOps Security Dashboard</h1>" >> security_report.html

          echo "<p><b>Commit:</b> ${GITHUB_SHA::7}</p>" >> security_report.html
          echo "<p><b>Generated:</b> $(date)</p>" >> security_report.html

          echo "<h2>Pipeline Results</h2>" >> security_report.html

          echo "<table border='1' cellpadding='10' style='border-collapse:collapse;background:white'>" >> security_report.html
          echo "<tr><th>Security Scan</th><th>Status</th></tr>" >> security_report.html
          echo "<tr><td>Secret Scan</td><td>$SECRET</td></tr>" >> security_report.html
          echo "<tr><td>Dependency Scan</td><td>$DEP</td></tr>" >> security_report.html
          echo "<tr><td>Static Code Scan</td><td>$STATIC</td></tr>" >> security_report.html
          echo "</table>" >> security_report.html

          echo "<h2>Security Score</h2>" >> security_report.html
          echo "<h1>$SCORE / 100</h1>" >> security_report.html

          echo "<h2 style='color:$COLOR'>Status: $STATUS</h2>" >> security_report.html

          echo "<p>Generated automatically by SecureFlow DevSecOps Pipeline</p>" >> security_report.html

          echo "</body></html>" >> security_report.html

      - name: Upload Security Report
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: security_report.html

# -------------------------------
# 5. Setup GitHub Pages
# -------------------------------
  setup_pages:
    needs: security_report
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write
      contents: read

    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v4

# -------------------------------
# 6. Upload Website Artifact
# -------------------------------
  upload:
    needs: setup_pages
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

# -------------------------------
# 7. Deploy Website
# -------------------------------
  deploy:
    needs: upload
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write
      contents: read

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
